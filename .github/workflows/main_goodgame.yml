# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Good Game to Azure

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  # ──────────────────────────────────────────────
  # 1. Build the frontend (Vite / React)
  # ──────────────────────────────────────────────
  build-frontend:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '24.x'

      - name: Install and build frontend
        working-directory: ./frontend
        env:
          VITE_API_URL: https://goodgame-api.azurewebsites.net
        run: |
          npm install
          npm run build --if-present
          npm run test --if-present

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-app
          path: ./frontend

  # ──────────────────────────────────────────────
  # 2. Package the backend (Python / FastAPI)
  # ──────────────────────────────────────────────
  build-backend:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        working-directory: ./backend
        run: |
          python -m venv venv
          source venv/bin/activate
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-app
          path: ./backend

  # ──────────────────────────────────────────────
  # 3. Deploy frontend to Azure Web App
  # ──────────────────────────────────────────────
  deploy-frontend:
    runs-on: ubuntu-latest
    needs: build-frontend
  
    steps:
          - uses: actions/checkout@v4  # ADD THIS LINE
      
          - name: Download frontend artifact
            uses: actions/download-artifact@v4
            with:
              name: frontend-app
              path: ./frontend_release
              
          - name: Zip frontend artifact
            working-directory: ./frontend_release
            run: zip -r ../frontend.zip .
      
          - name: Deploy frontend to Azure Web App
            uses: azure/webapps-deploy@v3
            with:
              app-name: 'goodgame'
              package: ./frontend.zip
              publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_EA49EAAB5446432F820756D19AA66FEC }}

  # ──────────────────────────────────────────────
  # 4. Deploy backend to Azure Web App
  # ──────────────────────────────────────────────
  deploy-backend:
    runs-on: ubuntu-latest
    needs: build-backend
  
    steps:
          - uses: actions/checkout@v4  # ADD THIS LINE
      
          - name: Download backend artifact
            uses: actions/download-artifact@v4
            with:
              name: backend-app
              path: ./backend_release

          - name: Zip backend artifact
            working-directory: ./backend_release
            run: zip -r ../backend.zip .
      
          - name: Deploy backend to Azure Web App
            uses: azure/webapps-deploy@v3
            with:
              app-name: 'goodgame-api'
              package: ./backend.zip
              publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_BACKEND }}
